# 1. Port và ID định danh (Render tự cấp PORT, nếu ở máy nhà thì dùng 8080)
server.port=${PORT:8080}
server.id=${SERVER_ID:Local_Server}

# 2. Cấu hình PostgreSQL (Lấy từ Environment Variables trên Render)
# Đảm bảo trên Render bạn đã đặt tên biến là SPRING_DATASOURCE_URL
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Cấu hình JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Dòng quan trọng nhất để fix lỗi "Unable to determine Dialect" trên Cloud
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 4. Cấu hình hệ thống phân tán (Link 4 node còn lại)
peer.servers=${PEER_SERVERS:}

# 5. Cho phép ghi đè Bean để tránh lỗi khi dùng đa luồng/Async
spring.main.allow-bean-definition-overriding=true